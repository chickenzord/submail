server:
  addr: ":8080"
  admin:
    enabled: false          # set to true to enable the web-based admin viewer
    password: "changeme"   # or use env: SUBMAIL_ADMIN_PASSWORD[__FILE]

imap:
  host: imap.example.com
  port: 993                     # 993 for tls (default), 143 for starttls
  username: bot@example.com
  password: secret              # or use env: SUBMAIL_IMAP_PASSWORD[__FILE]
  mailbox: INBOX                # mailbox to monitor (default: INBOX)
  tls_mode: tls                 # tls (implicit, default) | starttls | none

storage:
  path: ./submail.db

agents:
  - id: agent1
    token: "agent1-secret-token"   # or use env: SUBMAIL_AGENT_AGENT1_TOKEN[__FILE]
    addresses:
      - "bot+agent1@example.com"
  - id: agent2
    token: "agent2-secret-token"   # or use env: SUBMAIL_AGENT_AGENT2_TOKEN[__FILE]
    addresses:
      - "bot+agent2@example.com"
