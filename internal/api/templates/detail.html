<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Subject}} — Submail Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; color: #111; }
    nav {
      background: #1e1b4b;
      color: #fff;
      padding: .75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    nav .brand { font-weight: 700; font-size: 1rem; letter-spacing: .02em; }
    nav .brand span { color: #a5b4fc; font-weight: 400; }
    nav a {
      color: #c7d2fe;
      font-size: .875rem;
      text-decoration: none;
    }
    nav a:hover { color: #fff; }
    nav a.logout { margin-left: auto; }
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .back { font-size: .875rem; color: #4f46e5; text-decoration: none; display: inline-flex; align-items: center; gap: .25rem; margin-bottom: 1.25rem; }
    .back:hover { text-decoration: underline; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; }
    .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #e5e7eb; }
    .subject { font-size: 1.125rem; font-weight: 600; color: #111; margin-bottom: .875rem; }
    .fields { display: grid; grid-template-columns: 80px 1fr; gap: .375rem .75rem; font-size: .875rem; }
    .fields .label { color: #6b7280; font-weight: 500; padding-top: .1rem; }
    .fields .value { color: #111; font-family: ui-monospace, monospace; font-size: .8rem; word-break: break-all; }
    .fields .value.plain { font-family: inherit; font-size: .875rem; }
    .tabs { display: flex; gap: 0; border-bottom: 1px solid #e5e7eb; }
    .tab-btn {
      padding: .625rem 1.25rem;
      font-size: .875rem;
      cursor: pointer;
      border: none;
      background: none;
      color: #6b7280;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; font-weight: 500; }
    .tab-btn:hover:not(.active) { color: #374151; }
    .tab-panel { display: none; padding: 1.25rem 1.5rem; }
    .tab-panel.active { display: block; }
    pre.text-body {
      font-family: ui-monospace, monospace;
      font-size: .8rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #374151;
      line-height: 1.6;
    }
    iframe.html-body {
      width: 100%;
      min-height: 500px;
      border: none;
      display: block;
    }
    .empty-body { color: #9ca3af; font-size: .875rem; font-style: italic; }
    .id-row { margin-top: .875rem; padding-top: .875rem; border-top: 1px solid #f3f4f6; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Submail <span>Admin</span></span>
    <a href="/admin/">All messages</a>
    <a class="logout" href="/admin/logout">Sign out</a>
  </nav>
  <div class="container">
    <a class="back" href="/admin/">&larr; Back to inbox</a>
    <div class="card">
      <div class="card-header">
        <div class="subject">{{if .Subject}}{{.Subject}}{{else}}<em style="color:#9ca3af">No subject</em>{{end}}</div>
        <div class="fields">
          <span class="label">From</span><span class="value">{{.From}}</span>
          <span class="label">To</span><span class="value">{{.To}}</span>
          <span class="label">Date</span><span class="value plain">
            <time class="local-time" datetime="{{timeRFC3339 .ReceivedAt}}" title="{{timeFormat .ReceivedAt}}">{{timeFormat .ReceivedAt}}</time>
          </span>
          <span class="label id-row">ID</span><span class="value id-row">{{.ID}}</span>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn{{if .HTMLBody}} active{{end}}{{if not .HTMLBody}} active{{end}}" onclick="showTab('text')" id="tab-text">Plain Text</button>
        {{if .HTMLBody}}<button class="tab-btn" onclick="showTab('html')" id="tab-html">HTML</button>{{end}}
      </div>
      <div class="tab-panel{{if not .HTMLBody}} active{{end}}" id="panel-text">
        {{if .TextBody}}
        <pre class="text-body">{{.TextBody}}</pre>
        {{else}}
        <p class="empty-body">No plain text body.</p>
        {{end}}
      </div>
      {{if .HTMLBody}}
      <div class="tab-panel" id="panel-html">
        <iframe class="html-body" sandbox="allow-same-origin allow-popups" srcdoc="{{.HTMLBody}}"></iframe>
      </div>
      {{end}}
    </div>
  </div>
  <script>
    function showTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }
    // Activate correct default tab
    (function() {
      var hasHtml = document.getElementById('tab-html');
      var defaultTab = hasHtml ? 'html' : 'text';
      showTab(defaultTab);
    })();
    // Local-time rendering
    function pad(n) { return String(n).padStart(2, '0'); }
    function fmtLocal(d) {
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
             ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
    document.querySelectorAll('time.local-time').forEach(function(el) {
      var d = new Date(el.getAttribute('datetime'));
      if (!isNaN(d)) el.textContent = fmtLocal(d);
    });
  </script>
</body>
</html>
