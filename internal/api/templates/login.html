<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Submail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; color: #111; }
    h1 span { color: #6b7280; font-weight: 400; }
    label { display: block; font-size: .875rem; color: #374151; margin-bottom: .375rem; }
    input[type="password"] {
      display: block;
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type="password"]:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,.15); }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 4px;
      padding: .5rem .75rem;
      font-size: .875rem;
      margin-bottom: 1rem;
    }
    button {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: .6rem 1rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Submail <span>Admin</span></h1>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    <form method="POST" action="/admin/login">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autofocus autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
